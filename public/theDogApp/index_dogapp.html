<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
   <style>
        body {
            padding: 8px;
            max-width: 100%;
        }

        button{
            margin: 1px
        }

        .dogsDivClass{
            border: 5px solid black;
            padding: 3px;
            text-align: center;
            max-width: 100%;
        }

        #tempButtonsDiv {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
            max-width: 100%;
        }

        #breed_data {
            background: #fff;
            border-radius: 4px;
            padding: 12px;
            font-size: 12px;
            text-align: left;
            transition: all 0.2s;
            margin: 0 auto;
            max-width: 100%;
        }

        #breed_image {
            background: #fff;
            margin: 0 auto;
            max-width: 100%;
        }
        #breed_image img {
            max-width: 100%;
            height: auto;
        }
        #continue {
            width: auto;
            padding: 4px 12px;
        }


    </style>
</head>
<body>

<div id="banner-message">
    <h3>We choose the breed! </h3>
    <input type="text" placeholder="Minumum size">
    <input type="text" placeholder="Maximum size">
    <button onclick="updateDogs()">Push me!</button>

</div>
<button onclick="nextStep()" id="continue">Continue</button>
<p></p>
<div id="tempButtonsDiv">
</div>
<div id="dogsTextDivH">What dogs matches?</div>
<script src="script3.js"></script>
</body>
</html>
