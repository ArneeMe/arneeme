<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<div class="control-panel">
  <div class="control-top">
    <div class="app-title">
      <span class="app-title-main">Hoksrud-spillet</span>
      <span class="app-title-sub">Bruk piltaster for å bevege</span>
    </div>
    <div class="btn-row">
      <button class="button" onclick="byttPlayerIcon()">Bytt "playericon"</button>
    </div>
  </div>
  <div class="info-row">
    <span class="tekst green">Du er på</span>
    <span id="level" class="tekst level">level 1.</span>
    <span id="info" class="tekst info">Du (Bård Hoksrud) skal prøve å komme til sjokomelk. Men ikke la Moxnes ta deg! (Piltaster for å bevege)</span>
  </div>
</div>

<img src="sjokomelkRedigert1.jpg" id="sjokomelk">
<img src="bardhoksrudRedigert1.jpg" id="player">
