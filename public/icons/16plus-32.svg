<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#000080"/>
  <!-- Lock body -->
  <rect x="10" y="17" width="12" height="10" fill="#c0c0c0"/>
  <rect x="11" y="18" width="10" height="8" fill="#808080"/>
  <rect x="12" y="19" width="8" height="6" fill="#c0c0c0"/>
  <!-- Lock shackle -->
  <rect x="12" y="10" width="2" height="9" fill="#c0c0c0"/>
  <rect x="18" y="10" width="2" height="9" fill="#c0c0c0"/>
  <rect x="12" y="10" width="8" height="2" fill="#c0c0c0"/>
  <!-- Keyhole -->
  <rect x="15" y="20" width="2" height="4" fill="#000080"/>
  <rect x="14" y="20" width="4" height="2" fill="#000080"/>
  <!-- "16+" text area -->
  <rect x="0" y="25" width="32" height="7" fill="#c0c0c0"/>
  <!-- "1" -->
  <rect x="3" y="26" width="1" height="5" fill="#000080"/>
  <rect x="2" y="27" width="1" height="1" fill="#000080"/>
  <!-- "6" -->
  <rect x="5" y="26" width="3" height="1" fill="#000080"/>
  <rect x="5" y="26" width="1" height="5" fill="#000080"/>
  <rect x="5" y="28" width="3" height="1" fill="#000080"/>
  <rect x="7" y="29" width="1" height="2" fill="#000080"/>
  <rect x="5" y="30" width="3" height="1" fill="#000080"/>
  <!-- "+" -->
  <rect x="10" y="28" width="3" height="1" fill="#000080"/>
  <rect x="11" y="27" width="1" height="3" fill="#000080"/>
</svg>
