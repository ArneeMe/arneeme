<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- back half (darker pink) -->
  <rect x="2" y="5" width="12" height="6" fill="#ff6688" stroke="#000" stroke-width="1.2"/>
  <!-- front half (lighter pink) -->
  <rect x="2" y="8" width="12" height="3" fill="#ffbbcc" stroke="#000" stroke-width="1.2"/>
  <!-- divider line -->
  <line x1="2" y1="8" x2="14" y2="8" stroke="#000" stroke-width="1"/>
  <!-- shading highlight -->
  <rect x="3" y="6" width="2" height="1" fill="#ff99aa"/>
</svg>
