<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' width='32' height='32' shape-rendering='crispEdges'>
  <!-- handle arc -->
  <rect x='4' y='0' width='6' height='1' fill='#000'/>
  <rect x='3' y='1' width='1' height='2' fill='#000'/>
  <rect x='10' y='1' width='1' height='2' fill='#000'/>
  <!-- bucket rim (dark gray) -->
  <rect x='2' y='3' width='10' height='2' fill='#808080' stroke='#000' stroke-width='1'/>
  <!-- bucket body (silver) -->
  <rect x='3' y='5' width='8' height='8' fill='#c0c0c0' stroke='#000' stroke-width='1'/>
  <!-- blue paint pouring out -->
  <rect x='11' y='6' width='4' height='3' fill='#3366cc' stroke='#000' stroke-width='1'/>
  <!-- blue drip -->
  <rect x='13' y='13' width='2' height='2' fill='#3366cc' stroke='#000' stroke-width='1'/>
</svg>
