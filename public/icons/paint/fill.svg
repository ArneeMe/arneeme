<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- paint bucket body (tilted) -->
  <polygon points="3,5 11,5 12,13 4,13" fill="#c0c0c0" stroke="#000" stroke-width="1.2"/>
  <!-- rim -->
  <ellipse cx="7" cy="5" rx="4" ry="1.2" fill="#808080" stroke="#000" stroke-width="1"/>
  <!-- handle -->
  <path d="M4 5 Q3 2 7 2 Q11 2 10 5" fill="none" stroke="#000" stroke-width="1.2"/>
  <!-- blue paint spilling -->
  <polygon points="11,5 14,8 15,13 12,13" fill="#3366cc" stroke="#000" stroke-width="1"/>
  <!-- drip -->
  <circle cx="14" cy="14" r="1.3" fill="#3366cc" stroke="#000" stroke-width="0.8"/>
</svg>
