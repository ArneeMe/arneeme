<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' width='16' height='16'>
  <!-- bucket body (silver) -->
  <polygon points='3,4 11,4 12,13 4,13' fill='#c0c0c0' stroke='#000' stroke-width='1'/>
  <!-- bucket rim (darker) -->
  <rect x='3' y='3' width='8' height='2' fill='#808080' stroke='#000' stroke-width='1'/>
  <!-- handle -->
  <polyline points='4,3 4,1 10,1 10,3' fill='none' stroke='#000' stroke-width='1'/>
  <!-- blue paint spilling out right side -->
  <polygon points='11,4 15,8 15,14 12,13' fill='#3366cc' stroke='#000' stroke-width='1'/>
  <!-- blue drip -->
  <rect x='13' y='14' width='2' height='2' fill='#3366cc' stroke='#000' stroke-width='1'/>
</svg>
