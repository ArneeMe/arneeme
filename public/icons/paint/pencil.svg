<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- pencil body (yellow wood) -->
  <rect x="7" y="1" width="4" height="9" fill="#ffd83d" stroke="#000" stroke-width="1" transform="rotate(45 9 5.5)"/>
  <!-- metal ferrule -->
  <rect x="7" y="1" width="4" height="2" fill="#c0c0c0" stroke="#000" stroke-width="1" transform="rotate(45 9 5.5)"/>
  <!-- graphite tip -->
  <polygon points="2,11 1,14 4,13" fill="#333" stroke="#000" stroke-width="1"/>
  <!-- eraser end -->
  <rect x="11.2" y="1.2" width="2" height="2" fill="#e44" stroke="#000" stroke-width="0.8" transform="rotate(45 12.2 2.2)"/>
</svg>
