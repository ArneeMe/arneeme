<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' width='32' height='32' shape-rendering='crispEdges'>
  <!-- graphite tip (bottom-left) -->
  <rect x='1' y='13' width='1' height='2' fill='#000'/>
  <rect x='2' y='12' width='2' height='2' fill='#333'/>
  <!-- yellow pencil body diagonally going up-right -->
  <rect x='3' y='10' width='2' height='2' fill='#ffd83d' stroke='#000' stroke-width='1'/>
  <rect x='5' y='8' width='2' height='2' fill='#ffd83d' stroke='#000' stroke-width='1'/>
  <rect x='7' y='6' width='2' height='2' fill='#ffd83d' stroke='#000' stroke-width='1'/>
  <rect x='9' y='4' width='2' height='2' fill='#ffd83d' stroke='#000' stroke-width='1'/>
  <!-- silver ferrule -->
  <rect x='11' y='2' width='2' height='2' fill='#c0c0c0' stroke='#000' stroke-width='1'/>
  <!-- pink eraser end -->
  <rect x='13' y='0' width='2' height='2' fill='#ff6688' stroke='#000' stroke-width='1'/>
</svg>
