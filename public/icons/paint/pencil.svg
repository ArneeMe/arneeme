<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' width='16' height='16'>
  <!-- diagonal pencil body (yellow) -->
  <polygon points='3,13 5,15 14,6 12,4' fill='#ffd83d' stroke='#000' stroke-width='1'/>
  <!-- metal ferrule -->
  <polygon points='11,5 13,3 15,5 13,7' fill='#c0c0c0' stroke='#000' stroke-width='1'/>
  <!-- pink eraser tip -->
  <polygon points='13,3 15,1 16,2 15,5' fill='#ff6688' stroke='#000' stroke-width='1'/>
  <!-- graphite point -->
  <polygon points='1,15 3,13 5,15 3,16' fill='#333' stroke='#000' stroke-width='1'/>
</svg>
