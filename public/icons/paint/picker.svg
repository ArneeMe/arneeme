<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- eyedropper shaft -->
  <rect x="9" y="2" width="3" height="7" fill="#c0c0c0" stroke="#000" stroke-width="1" transform="rotate(45 10.5 5.5)"/>
  <!-- rubber bulb top (colored) -->
  <rect x="10.5" y="0.5" width="3.5" height="3" fill="#e44" stroke="#000" stroke-width="1" transform="rotate(45 12.25 2)"/>
  <!-- tip point -->
  <polygon points="2,14 1,15 3,15 4,14" fill="#000"/>
  <!-- drop -->
  <circle cx="2.5" cy="13" r="1.2" fill="#3366cc" stroke="#000" stroke-width="0.8"/>
</svg>
